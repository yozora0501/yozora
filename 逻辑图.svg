<svg xmlns="http://www.w3.org/2000/svg" width="960" height="540" viewBox="0 0 960 540" role="img" aria-labelledby="title desc">
  <title id="title">个人作品集网站逻辑图</title>
  <desc id="desc">展示访客从首页进入项目、关于我、文档与反馈模块的页面逻辑。</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#101816"/>
      <stop offset="1" stop-color="#050706"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#66ffcc"/>
      <stop offset="1" stop-color="#2a6f4f"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="16" flood-color="#000000" flood-opacity="0.35"/>
    </filter>
    <style>
      .label { fill: #f0f0f0; font-family: Arial, "Microsoft YaHei", sans-serif; font-size: 24px; font-weight: 700; }
      .sub { fill: #b8c8c1; font-family: Arial, "Microsoft YaHei", sans-serif; font-size: 15px; }
      .node { fill: #111917; stroke: #2f4b40; stroke-width: 2; filter: url(#shadow); }
      .main { stroke: #66ffcc; stroke-width: 3; }
      .line { stroke: #4f6b60; stroke-width: 3; fill: none; stroke-linecap: round; stroke-linejoin: round; }
      .dot { fill: #66ffcc; }
      .badge { fill: rgba(102, 255, 204, 0.12); stroke: rgba(102, 255, 204, 0.3); }
    </style>
  </defs>
  <rect width="960" height="540" rx="34" fill="url(#bg)"/>
  <circle cx="818" cy="92" r="118" fill="#66ffcc" opacity="0.06"/>
  <circle cx="124" cy="458" r="140" fill="#66ffcc" opacity="0.04"/>
  <text x="56" y="64" class="label">个人作品集网站逻辑图</text>
  <text x="56" y="92" class="sub">从入口、内容展示到反馈收集的核心路径</text>

  <path class="line" d="M480 146 L480 212"/>
  <path class="line" d="M480 308 L480 374"/>
  <path class="line" d="M480 308 C326 330 250 350 204 386"/>
  <path class="line" d="M480 308 C634 330 710 350 756 386"/>
  <path class="line" d="M480 212 C326 192 250 180 204 154"/>
  <path class="line" d="M480 212 C634 192 710 180 756 154"/>

  <rect x="340" y="112" width="280" height="70" rx="22" class="node main"/>
  <text x="480" y="143" text-anchor="middle" class="label">首页入口</text>
  <text x="480" y="166" text-anchor="middle" class="sub">导航到项目与个人信息</text>

  <rect x="340" y="224" width="280" height="84" rx="22" class="node"/>
  <text x="480" y="258" text-anchor="middle" class="label">项目详情页</text>
  <text x="480" y="282" text-anchor="middle" class="sub">展示流程、图像、文档与反馈</text>

  <rect x="88" y="120" width="232" height="80" rx="20" class="node"/>
  <text x="204" y="153" text-anchor="middle" class="label">思维导图</text>
  <text x="204" y="177" text-anchor="middle" class="sub">立项思路与范围拆解</text>

  <rect x="640" y="120" width="232" height="80" rx="20" class="node"/>
  <text x="756" y="153" text-anchor="middle" class="label">Axure 原型</text>
  <text x="756" y="177" text-anchor="middle" class="sub">低保真交互与页面跳转</text>

  <rect x="88" y="386" width="232" height="80" rx="20" class="node"/>
  <text x="204" y="419" text-anchor="middle" class="label">关于我</text>
  <text x="204" y="443" text-anchor="middle" class="sub">经历、能力与价值观</text>

  <rect x="340" y="386" width="280" height="80" rx="20" class="node"/>
  <text x="480" y="419" text-anchor="middle" class="label">产品文档</text>
  <text x="480" y="443" text-anchor="middle" class="sub">逻辑图 / PRD / 交互设计</text>

  <rect x="640" y="386" width="232" height="80" rx="20" class="node"/>
  <text x="756" y="419" text-anchor="middle" class="label">评分反馈</text>
  <text x="756" y="443" text-anchor="middle" class="sub">收集评分与优化建议</text>

  <circle cx="480" cy="212" r="6" class="dot"/>
  <circle cx="480" cy="308" r="6" class="dot"/>
  <rect x="772" y="42" width="124" height="34" rx="17" class="badge"/>
  <text x="834" y="64" text-anchor="middle" class="sub">Portfolio Flow</text>
</svg>
